<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Library Management System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f9;
    }

    header {
      background: #2c3e50;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 22px;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    input {
      padding: 10px;
      margin: 5px;
      width: 200px;
    }

    button {
      padding: 10px 15px;
      border: none;
      background: #3498db;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #2980b9;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
      text-align: center;
    }

    th {
      background: #34495e;
      color: white;
    }
  </style>
</head>

<body>

<header>
  📚 Library Management System
</header>

<div class="container">

  <!-- Add Book -->
  <div class="card">
    <h3>Add Book</h3>
    <input type="text" id="bookName" placeholder="Book Name">
    <input type="text" id="authorName" placeholder="Author Name">
    <button onclick="addBook()">Add</button>
  </div>

  <!-- Book List -->
  <div class="card">
    <h3>Book List</h3>
    <table>
      <thead>
        <tr>
          <th>Book</th>
          <th>Author</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="bookTable"></tbody>
    </table>
  </div>

</div>

<script>
  let books = JSON.parse(localStorage.getItem("books")) || [];

  function saveData() {
    localStorage.setItem("books", JSON.stringify(books));
  }

  function displayBooks() {
    let table = document.getElementById("bookTable");
    table.innerHTML = "";

    books.forEach((book, index) => {
      table.innerHTML += `
        <tr>
          <td>${book.name}</td>
          <td>${book.author}</td>
          <td><button onclick="deleteBook(${index})">Delete</button></td>
        </tr>
      `;
    });
  }

  function addBook() {
    let name = document.getElementById("bookName").value;
    let author = document.getElementById("authorName").value;

    if (name === "" || author === "") {
      alert("Please fill all fields");
      return;
    }

    books.push({ name, author });
    saveData();
    displayBooks();

    document.getElementById("bookName").value = "";
    document.getElementById("authorName").value = "";
  }

  function deleteBook(index) {
    books.splice(index, 1);
    saveData();
    displayBooks();
  }

  displayBooks();
</script>

</body>
</html>
